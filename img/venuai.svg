<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="vg" x1="0%" y1="10%" x2="100%" y2="90%">
      <stop offset="0%" stop-color="#69c0f0"/>
      <stop offset="100%" stop-color="#1a6bbf"/>
    </linearGradient>
  </defs>
  <!-- Left V arm: top-left down to bottom-center -->
  <polyline
    points="22,30 72,155 100,80"
    fill="none"
    stroke="url(#vg)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Right V arm: bottom-center up to top-right, forming W/double-V -->
  <polyline
    points="72,155 100,80 128,155 178,30"
    fill="none"
    stroke="url(#vg)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
